<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소멸시효 OX 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #18181f;
    --surface2: #22222c;
    --border: #2e2e3a;
    --accent: #7c6ff7;
    --accent2: #a594f9;
    --correct: #2ec98e;
    --correct-bg: #0d2e22;
    --wrong: #f05b5b;
    --wrong-bg: #2e0d0d;
    --text: #e8e8f0;
    --text2: #9898b0;
    --text3: #6060780;
    --gold: #f5c842;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  .site-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .site-header .logo {
    font-family: 'Noto Serif KR', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: -0.3px;
  }
  .site-header .sub {
    font-size: 12px;
    color: var(--text2);
    margin-left: auto;
  }

  /* ── LAYOUT ── */
  .container { max-width: 820px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  /* ── SCREEN MANAGEMENT ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── HOME SCREEN ── */
  .home-hero {
    text-align: center;
    padding: 3rem 0 2.5rem;
  }
  .home-hero h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(26px, 5vw, 38px);
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.6rem;
    letter-spacing: -0.5px;
  }
  .home-hero p {
    color: var(--text2);
    font-size: 15px;
  }

  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 2rem 0 1.5rem;
  }
  @media(max-width:520px){ .mode-grid { grid-template-columns: 1fr; } }

  .mode-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.4rem 1.2rem;
    cursor: pointer;
    transition: border-color .2s, transform .15s;
    text-align: left;
    position: relative;
    overflow: hidden;
  }
  .mode-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent) 0%, transparent 60%);
    opacity: 0;
    transition: opacity .2s;
    pointer-events: none;
  }
  .mode-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .mode-card:hover::before { opacity: .06; }
  .mode-card.featured { border-color: var(--accent); }

  .mode-card .badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    margin-bottom: 10px;
    letter-spacing: .5px;
    text-transform: uppercase;
  }
  .mode-card .badge.gold { background: var(--gold); color: #1a1400; }
  .mode-card h3 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .mode-card p {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.5;
  }

  /* ── 랜덤 문제 수 선택 ── */
  .random-count-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .count-btn {
    flex: 1;
    min-width: 56px;
    padding: 7px 0;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface2);
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    transition: border-color .15s, background .15s, color .15s;
    font-family: 'Noto Sans KR', sans-serif;
    text-align: center;
  }
  .count-btn:hover { border-color: var(--gold); color: var(--gold); }
  .count-btn.active {
    border-color: var(--gold);
    background: #2a2200;
    color: var(--gold);
    font-weight: 700;
  }
  .random-start-btn {
    width: 100%;
    margin-top: 10px;
    padding: 10px 0;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--gold);
    color: #1a1400;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: opacity .15s, transform .1s;
  }
  .random-start-btn:hover { opacity: .88; transform: translateY(-1px); }

  .week-section { margin-top: 2rem; }
  .week-section h2 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .week-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
  }
  .week-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 1rem;
    cursor: pointer;
    transition: border-color .2s, transform .1s;
    text-align: left;
  }
  .week-btn:hover { border-color: var(--accent2); transform: translateY(-1px); }
  .week-btn .wk-num {
    font-size: 11px;
    color: var(--accent2);
    font-weight: 600;
    margin-bottom: 4px;
    letter-spacing: .5px;
  }
  .week-btn .wk-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }
  .week-btn .wk-count {
    font-size: 12px;
    color: var(--text2);
  }

  /* ── QUIZ SCREEN ── */
  .quiz-topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .back-btn {
    background: var(--surface);
    border: 1.5px solid var(--correct);
    border-radius: var(--radius-sm);
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--correct);
    cursor: pointer;
    transition: border-color .2s, color .2s, background .2s;
  }
  .back-btn:hover { background: var(--correct-bg); color: #fff; border-color: #3de0a0; }

  .quiz-meta {
    flex: 1;
  }
  .quiz-meta .qm-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .quiz-meta .qm-sub {
    font-size: 12px;
    color: var(--text2);
  }

  .progress-wrap {
    margin-bottom: 1.5rem;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 6px;
  }
  .progress-track {
    background: var(--surface2);
    border-radius: 4px;
    height: 5px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width .35s ease;
  }

  /* question card */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1rem;
    transition: border-color .2s;
  }
  .q-card.state-correct { border-color: var(--correct); }
  .q-card.state-wrong { border-color: var(--wrong); }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 1.1rem;
  }
  .q-num-badge {
    background: var(--surface2);
    border-radius: 6px;
    padding: 3px 9px;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent2);
    white-space: nowrap;
    margin-top: 2px;
    flex-shrink: 0;
  }
  .q-text {
    font-size: 15px;
    color: var(--text);
    line-height: 1.75;
    font-family: 'Noto Serif KR', serif;
    font-weight: 400;
  }

  .btn-row {
    display: flex;
    gap: 8px;
  }
  .ox-btn {
    flex: 1;
    padding: 10px 0;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface2);
    font-size: 20px;
    cursor: pointer;
    transition: background .15s, border-color .15s, transform .1s;
    color: var(--text2);
  }
  .ox-btn:hover:not(:disabled) { background: var(--bg); border-color: var(--accent); transform: scale(1.02); }
  .ox-btn:disabled { cursor: default; opacity: .75; }
  .ox-btn.sel-correct-o, .ox-btn.sel-correct-x {
    border-color: var(--correct);
    background: var(--correct-bg);
    color: var(--correct);
  }
  .ox-btn.sel-wrong-o, .ox-btn.sel-wrong-x {
    border-color: var(--wrong);
    background: var(--wrong-bg);
    color: var(--wrong);
  }

  .feedback-box {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    font-size: 13.5px;
    line-height: 1.7;
    display: none;
  }
  .feedback-box.show { display: block; }
  .feedback-box.fb-correct {
    background: var(--correct-bg);
    border: 1px solid #1a5e3f;
    color: #5de8ae;
  }
  .feedback-box.fb-wrong {
    background: var(--wrong-bg);
    border: 1px solid #5e1a1a;
    color: #f08080;
  }
  .fb-label {
    font-weight: 600;
    margin-right: 6px;
  }

  /* ── RESULT SCREEN ── */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem 2rem;
    text-align: center;
    margin: 2rem 0;
  }
  .result-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 20px;
    color: var(--text2);
    margin-bottom: 1rem;
  }
  .score-display {
    font-family: 'Noto Serif KR', serif;
    font-size: 56px;
    font-weight: 700;
    color: var(--accent2);
    margin-bottom: 0.3rem;
    line-height: 1;
  }
  .score-total {
    font-size: 14px;
    color: var(--text2);
    margin-bottom: 1.2rem;
  }
  .score-msg {
    font-size: 16px;
    color: var(--text);
    margin-bottom: 2rem;
  }
  .result-stars {
    font-size: 28px;
    margin-bottom: 1.5rem;
    letter-spacing: 4px;
  }

  .stat-row {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 2rem;
  }
  .stat-item { text-align: center; }
  .stat-num {
    font-size: 24px;
    font-weight: 600;
    color: var(--text);
    display: block;
  }
  .stat-num.c { color: var(--correct); }
  .stat-num.w { color: var(--wrong); }
  .stat-label { font-size: 12px; color: var(--text2); }

  .result-btns {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 11px 24px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .btn-primary:hover { opacity: .85; transform: translateY(-1px); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 24px;
    font-size: 14px;
    cursor: pointer;
    transition: border-color .15s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .btn-secondary:hover { border-color: var(--accent); }

  /* review section in result */
  .review-section { margin-top: 2rem; }
  .review-section h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 12px;
    letter-spacing: .5px;
    text-transform: uppercase;
  }
  .review-item {
    background: var(--surface);
    border: 1px solid var(--wrong);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .review-item .ri-q {
    font-size: 13.5px;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.6;
  }
  .review-item .ri-ans {
    font-size: 12px;
    color: #f08080;
  }

  /* ── 오답노트 NAV BADGE ── */
  .note-nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 14px;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    transition: border-color .2s, color .2s;
    display: flex;
    align-items: center;
    gap: 6px;
    position: relative;
  }
  .note-nav-btn:hover { border-color: var(--wrong); color: var(--wrong); }
  .note-badge {
    background: var(--wrong);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    border-radius: 20px;
    padding: 1px 6px;
    min-width: 18px;
    text-align: center;
    display: none;
  }
  .note-badge.show { display: inline-block; }

  /* ── 오답노트 SCREEN ── */
  .note-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .note-header h2 {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }
  .note-empty {
    text-align: center;
    padding: 4rem 0;
    color: var(--text2);
    font-size: 15px;
  }
  .note-empty span { display: block; font-size: 36px; margin-bottom: 12px; }

  .note-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.2rem 1.2rem 1rem;
    margin-bottom: 10px;
    position: relative;
    transition: border-color .2s, opacity .25s;
  }
  .note-card:hover { border-color: #3e3e52; }
  .note-card.removing { opacity: 0; transform: translateX(20px); transition: opacity .25s, transform .25s; }

  .note-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
  }
  .note-q {
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
    font-family: 'Noto Serif KR', serif;
    flex: 1;
  }
  .note-del-btn {
    background: none;
    border: none;
    color: var(--text2);
    font-size: 16px;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    flex-shrink: 0;
    line-height: 1;
    transition: color .15s, background .15s;
  }
  .note-del-btn:hover { color: var(--wrong); background: var(--wrong-bg); }

  .note-divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 10px;
  }
  .note-ans-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .note-ans-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--correct-bg);
    color: var(--correct);
    border: 1px solid #1a5e3f;
    flex-shrink: 0;
  }
  .note-exp {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.65;
  }
  .note-cite {
    display: inline-block;
    margin-top: 6px;
    font-size: 11.5px;
    color: var(--accent2);
    background: #1e1a3a;
    border: 1px solid #3a3060;
    border-radius: 4px;
    padding: 2px 8px;
    font-family: monospace;
    letter-spacing: .3px;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header class="site-header">
  <div class="logo">소멸시효 OX</div>
  <div class="sub">민법 강의 25–28강</div>
  <button class="note-nav-btn" onclick="showScreen('note')">
    📋 오답노트
    <span class="note-badge" id="note-badge">0</span>
  </button>
</header>

<!-- ════════════════════════════════════════
     HOME SCREEN
════════════════════════════════════════ -->
<div id="screen-home" class="screen active">
  <div class="container">
    <div class="home-hero">
      <h1>소멸시효 OX 퀴즈</h1>
      <p>강의 25–28강 전범위 · 총 123문제</p>
    </div>

    <div class="mode-grid">
      <div class="mode-card featured" onclick="startQuiz('all')">
        <div class="badge">전범위</div>
        <h3>전체 문제 풀기</h3>
        <p>25강~28강 모든 문제를 순서대로 풀어봅니다. 총 123문제</p>
      </div>
      <div class="mode-card" id="random-card">
        <div class="badge gold">랜덤</div>
        <h3>랜덤 문제 풀기</h3>
        <p>전체 문제에서 무작위로 뽑아 순서도 섞어 출제합니다.</p>
        <div class="random-count-row">
          <button class="count-btn" onclick="setRandomCount(10, this)">10문제</button>
          <button class="count-btn active" onclick="setRandomCount(30, this)">30문제</button>
          <button class="count-btn" onclick="setRandomCount(50, this)">50문제</button>
          <button class="count-btn" onclick="setRandomCount(123, this)">전문제</button>
        </div>
        <button class="random-start-btn" onclick="startQuiz('random')">시작하기 →</button>
      </div>
    </div>

    <div class="week-section">
      <h2>주차별 선택</h2>
      <div class="week-grid">
        <div class="week-btn" onclick="startQuiz('w25')">
          <div class="wk-num">강의 25</div>
          <div class="wk-title">소멸시효기간</div>
          <div class="wk-count">30문제</div>
        </div>
        <div class="week-btn" onclick="startQuiz('w26')">
          <div class="wk-num">강의 26</div>
          <div class="wk-title">중단 — 재판상청구</div>
          <div class="wk-count">24문제</div>
        </div>
        <div class="week-btn" onclick="startQuiz('w27')">
          <div class="wk-num">강의 27</div>
          <div class="wk-title">중단 — 가압류·승인</div>
          <div class="wk-count">38문제</div>
        </div>
        <div class="week-btn" onclick="startQuiz('w28')">
          <div class="wk-num">강의 28</div>
          <div class="wk-title">효력·원용·포기</div>
          <div class="wk-count">31문제</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════
     QUIZ SCREEN
════════════════════════════════════════ -->
<div id="screen-quiz" class="screen">
  <div class="container">
    <div class="quiz-topbar">
      <button class="back-btn" onclick="goHome()">← 홈</button>
      <div class="quiz-meta">
        <div class="qm-title" id="quiz-title">퀴즈</div>
        <div class="qm-sub" id="quiz-sub"></div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="prog-text">0 / 0</span>
        <span id="score-text">정답 0개</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="prog-fill" style="width:0%"></div>
      </div>
    </div>
    <div id="questions-area"></div>
  </div>
</div>

<!-- ════════════════════════════════════════
     RESULT SCREEN
════════════════════════════════════════ -->
<div id="screen-result" class="screen">
  <div class="container">
    <div class="result-card">
      <div class="result-title" id="result-quiz-title">결과</div>
      <div class="score-display" id="result-score"></div>
      <div class="score-total" id="result-total"></div>
      <div class="stat-row">
        <div class="stat-item">
          <span class="stat-num c" id="stat-correct">0</span>
          <span class="stat-label">정답</span>
        </div>
        <div class="stat-item">
          <span class="stat-num w" id="stat-wrong">0</span>
          <span class="stat-label">오답</span>
        </div>
        <div class="stat-item">
          <span class="stat-num" id="stat-rate">0%</span>
          <span class="stat-label">정답률</span>
        </div>
      </div>

  {q:"상행위인 계약이 무효여서 발생한 부당이득반환청구권은 원칙적으로 10년 시효가 적용된다. 다만 보험사고를 가장하여 지급된 보험금 상당 부당이득반환청구처럼 상거래와 같이 신속한 해결 필요성이 인정되는 경우에는 상법 제64조가 유추적용되어 5년의 상사시효가 적용될 수 있다.",ans:true,exp:"맞습니다. 상행위 무효로 인한 부당이득은 원칙 10년이지만, 신속한 해결 필요성이 있는 경우(보험사기 편취금 등)에는 상법 §64 유추적용으로 5년이 적용됩니다. (2018다258074)"},

  {q:"회사가 배당가능이익 없이 이익배당을 실시한 경우, 회사의 주주에 대한 위법배당 부당이득반환청구권은 회사 영업과 직접 결부된 상행위에서 발생하므로 상법 제64조의 5년 상사시효가 적용된다.",ans:false,exp:"틀렸습니다. 위법배당 부당이득반환청구권은 상행위가 아니고 자본충실·채권자보호 취지의 청구이므로 10년 민사시효가 적용됩니다. (2020다208621)"},
  {q:"상법 제401조에 따른 이사의 제3자에 대한 손해배상책임에는 제3자 보호를 위한 특수한 책임으로서 민법 제162조 제1항의 10년 일반시효가 적용되고, 외부감사법상 단기시효 규정도 이 책임에는 적용되지 않는다.",ans:true,exp:"맞습니다. 이사의 임무해태로 인한 손해배상책임은 불법행위가 아닌 특수한 계약책임이므로 10년 일반시효가 적용되며, 외부감사법의 단기시효도 적용 없습니다. (2006다82601)"},
  {q:"상인이 영업을 위하여 근로자와 체결한 근로계약은 보조적 상행위에 해당하므로, 근로자의 주의의무 위반으로 인한 손해배상청구권에는 상법 제64조의 5년 상사시효가 적용된다.",ans:false,exp:"틀렸습니다. 근로자의 근로계약상 주의의무 위반으로 인한 손해배상청구권은 상거래 특유의 신속 필요성이 인정되지 않으므로 10년 민사시효가 적용됩니다. (2004다22742)"},
  {q:"보험자대위에 의하여 취득한 구상권의 소멸시효는 3년 단기시효(민법 제766조)가 적용되고, 기산점은 피해자에 대한 최초 손해발생 시점이다.",ans:false,exp:"틀렸습니다. 보험자대위 구상권의 시효는 일반채권과 같이 10년이고, 기산점은 실제 변제 시점입니다. (99다3143)"},
  {q:"공동불법행위자나 그 보증인 등이 피해자에게 현실로 손해배상금을 지급함으로써 취득하는 구상권의 소멸시효기간은 10년이고, 그 기산점은 실제 변제 시점이다.",ans:true,exp:"맞습니다. 공동불법행위 보증인의 구상권은 10년이고, 기산점은 보증인의 현실 변제 시입니다. (2007다37530)"},
  {q:"물상보증인이 변제 등으로 주채무자를 면책시키는 경우, 그 구상권은 물상보증위탁계약의 법적 성질과 관계없이 민법 제162조 제1항에 따른 10년 시효가 적용된다.",ans:true,exp:"맞습니다. 물상보증인의 구상권은 위임이 아닌 민법상 독립한 권리이므로 물상보증위탁계약의 성질과 관계없이 10년 민사시효가 적용됩니다. (2001다6237)"},
  {q:"금전채무의 이행지체로 발생하는 지연손해금 채권은 민법 제163조 제1호의 '1년 이내의 기간으로 정한 금전의 지급을 목적으로 한 채권'에 해당하므로 3년 단기시효의 대상이 된다.",ans:false,exp:"틀렸습니다. 지연손해금은 손해배상 성격이고, '1년 이내 기간으로 정한 채권'에도 해당하지 않으므로 3년 단기시효 대상이 아닙니다. (98다42141)"},
  {q:"집합건물법 제9조에 따른 분양자의 담보책임은 분양계약에서 파생한 계약책임이므로, 이에 기한 손해배상청구권에는 상법 제64조의 5년 상사시효가 적용된다.",ans:false,exp:"틀렸습니다. 집합건물 분양자의 담보책임은 법정책임이므로 도급 담보책임의 제척기간이 아닌 10년 소멸시효가 적용됩니다. (2008다12439)"},
  {q:"부동산실명법 유예기간 경과로 명의신탁약정이 무효가 된 경우, 명의신탁자가 명의수탁자를 상대로 행사하는 소유권이전등기청구권은 법률상 부당이득반환청구권의 성질을 가지므로 10년 소멸시효가 적용된다.",ans:true,exp:"맞습니다. 실명법 사후 명의신탁 무효로 인한 소유권이전등기청구는 법률상 부당이득반환청구로서 10년 시효가 적용됩니다. (2008다16899; 2009다23313)"},
  {q:"보험계약자가 다수 계약을 통해 보험금을 부정 취득할 목적으로 무효인 보험계약을 체결한 경우, 보험자의 보험금 상당 부당이득반환청구권에는 상법 제64조 취지를 유추하여 5년 상사시효가 적용될 수 있다.",ans:true,exp:"맞습니다. 사기적 무효 보험계약의 보험금 반환청구는 보험계약이 기본적 상행위이고 신속한 해결 필요성이 있으므로 상법 §64 유추적용으로 5년 시효가 적용됩니다. (2019다277812)"},
  {q:"정수기 대여계약이 금융리스에 해당하지 않고 사용 기회 제공을 본질로 하는 경우, 월 대여료는 3년 단기시효가 적용된다. 반면 금융리스의 경우 리스료 채권이 일시 확정되는 성격이므로 3년 단기시효의 대상이 되지 않는다.",ans:true,exp:"맞습니다. 사용기회 제공형 대여계약의 월 대여료는 사용료 채권으로 3년 단기시효가 적용되고, 금융리스료는 계약 시 일시에 확정되므로 3년 단기시효 대상이 아닙니다. (2013다20571; 99다1949)"},
  {q:"민법 제163조 제1호의 '1년 이내의 기간으로 정한 채권'이란, 단순히 변제기가 1년 이내에 도래하는 모든 채권을 뜻하는 것이 아니라 1년 이내의 정기(매월, 매분기 등)로 지급되도록 정한 채권을 의미하며, 이자채권이라도 1년 이내 정기 지급이 아닌 이상 3년 단기시효가 적용되지 않는다.",ans:true,exp:"맞습니다. '1년 이내 기간으로 정한 채권'은 단순 변제기 1년 이내와 구별되고, 이자채권도 정기지급이 아니면 3년 단기시효 대상이 아닙니다. (96다25302)"},
  {q:"집합건물의 관리비 채권은 1개월 단위로 정기 지급되므로, 민법 제163조 제1호의 '1년 이내의 정기로 지급되는 채권'에 해당하여 3년 단기시효가 적용된다.",ans:true,exp:"맞습니다. 집합건물 관리비는 매월 정기지급이므로 3년 단기시효가 적용됩니다. (2005다65821)"},
  {q:"은행이 영업행위로 한 대출금의 변제기 이후 발생하는 지연손해금 채권은 원본채권과 마찬가지로 상행위로 인한 채권에 해당하여 상법 제64조의 5년 시효가 적용될 수 있다.",ans:true,exp:"맞습니다. 은행 대출금의 지연손해금은 상행위로 인한 채권에 해당하여 5년 상사시효가 적용됩니다. (2006다2940)"},
  {q:"민법 제163조 제2호의 '의사의 치료에 관한 채권'은 장기 입원치료의 경우 퇴원 시부터 일괄적으로 소멸시효가 진행한다.",ans:false,exp:"틀렸습니다. 의사의 치료비 채권은 개개의 진료 종료 시마다 각각 시효가 진행하고, 장기 입원이라도 퇴원 시부터 일괄 진행하는 것이 아닙니다. (2001다52568)"},

  {q:"민법 제666조의 저당권설정청구권은 '공사에 부수되는 채권'에 해당하므로 소멸시효기간은 3년이다.",ans:true,exp:"맞습니다. 저당권설정청구권은 공사에 부수되는 채권으로 3년 단기시효가 적용됩니다. (2014다211978)"},
  {q:"공사대금채권이 시효로 소멸한 경우라도, 도급인의 공사 협력의무는 주된 채무와 무관한 별개의 채무이므로 시효로 소멸하지 않아, 협력의무 위반을 이유로 계약해제를 구할 수 있다.",ans:false,exp:"틀렸습니다. 도급인의 공사 협력의무도 '공사에 관한 채무'로 3년 단기시효에 걸리고, 공사대금 시효소멸 항변에는 협력의무 소멸 주장도 포함됩니다. 따라서 협력의무 위반을 이유로 한 계약해제는 불가합니다. (2010다56685)"},
  {q:"민법 제163조 제5호의 3년 단기시효는 열거된 자격사(변호사·변리사·공증인·공인회계사·법무사)에 한정하여 적용되고, 세무사의 직무에 관한 채권에는 유추적용되지 않는다. 또한 세무사 직무는 상사채권도 아니므로 10년 민사시효가 적용된다.",ans:true,exp:"맞습니다. 세무사의 직무에 관한 채권은 §163⑤ 유추적용도 안 되고 상사채권도 아니므로 10년 민사시효가 적용됩니다. (2021다311111)"},
  {q:"상행위로 인한 채권의 시효에 관하여 다른 법령이 더 단기의 시효를 정한 경우에는, 상사시효(5년)보다 그 특별법의 단기시효 규정이 우선 적용된다.",ans:true,exp:"맞습니다. 다른 법령에 더 단기의 시효 규정이 있으면 상사시효(5년)에 우선하여 그 특별법이 적용됩니다. (66다790)"},
  {q:"민법 제164조가 특별히 1년 단기시효를 정한 채권(숙박료, 음식대금 등)의 채권자라고 하여, 그 계약에서 상대방이 부담하는 반대채권까지 1년 단기시효가 적용되는 것은 아니다.",ans:true,exp:"맞습니다. §164의 1년 단기시효는 열거된 채권자의 채권에만 적용되고, 상대방의 반대채권에는 원칙적으로 10년 민사시효가 적용됩니다. (2013다65178)"},
  {q:"민법 제164조 제2호의 '기타 동산의 사용료의 채권'은 의복·침구·장구 등 일상생활에서 빈번한 단기 동산임대차에서 발생하는 임료채권을 의미하며, 1년 단기시효가 적용된다.",ans:true,exp:"맞습니다. '기타 동산의 사용료'는 일상적 단기 동산임대차 임료채권을 지칭하고, 1년 단기시효가 적용됩니다. (76다1839)"},
  {q:"민법 제165조는 단기 소멸시효에 해당하는 권리가 판결 등으로 확정되면 10년으로 연장하는 규정이므로, 10년보다 장기의 소멸시효를 단축시키거나 본래 시효의 대상이 아닌 권리를 시효에 걸리게 하는 취지는 아니다.",ans:true,exp:"맞습니다. §165는 단기→10년 연장일 뿐, 장기 시효 단축이나 무시효 권리에 시효를 부여하는 조항이 아닙니다. (80다1888, 1889)"},
  {q:"지급명령이 확정되면 확정판결과 동일한 효력이 있으므로, 단기시효에 해당하는 채권도 민법 제165조 제2항에 따라 10년 시효로 연장된다.",ans:true,exp:"맞습니다. 지급명령 확정은 확정판결과 동일한 효력이 있으므로 단기시효 채권도 10년으로 연장됩니다. (2009다39530; 민소법 474; 민법 §165②)"},
  {q:"소송비용상환청구권은 비용부담 재판 확정으로 이행기가 도래하므로 민법 제165조 제1항의 10년 연장 규정이 적용되고, 국가의 소송비용상환청구권에는 10년 시효가 적용된다.",ans:false,exp:"틀렸습니다. 소송비용상환청구권은 소송비용액확정결정 전까지 이행기가 도래하지 않으므로 §165①의 10년 연장이 적용되지 않고, 국가의 청구권에는 국가재정법 §96①의 5년 시효가 적용됩니다. (2019마6152)"},
  {q:"주채무에 대한 확정판결로 단기시효가 10년으로 연장된 후 제3자가 그 주채무를 보증하더라도, 보증채무는 주채무와 별개이므로 민법 제163조 각 호의 단기시효가 적용될 여지가 없다. 보증채권이 민사채권이면 10년, 상사채권이면 5년이다.",ans:true,exp:"맞습니다. 보증채무는 주채무와 별개이므로 주채무의 10년 연장 후 새로 보증해도 보증채무는 독립적으로 시효를 산정합니다. (2011다76105)"},
  {q:"시효항변은 법률해석의 문제이므로 법원은 당사자의 주장에 구속되지 않고 직권으로 판단할 수 있다. 그러나 '10년이냐 5년이냐'와 같이 어떤 시효기간이 적용되는지는 변론주의가 적용되는 주요사실의 항변이므로 당사자의 주장이 있어야 판단대상이 된다.",ans:false,exp:"틀렸습니다. 소멸시효의 기산일은 변론주의가 적용되지만, 시효기간이 몇 년인지(10년이냐 5년이냐)는 법률 해석의 문제이므로 법원이 직권으로 판단할 수 있습니다. (2016다258124; 2012다68217)"},
  {q:"동일 목적을 위해 복수의 채권을 가진 경우, 채무자의 시효완성 항변은 특정된 채권에만 미치며, 특정된 항변이 다른 채권까지 포괄한다고 볼 수 없다. 다만 채권자가 여러 채권 중 하나만 선택적으로 행사하는 것이 명백하다면, 채무자의 시효항변은 실제 행사되는 그 채권에 대한 항변으로 본다.",ans:true,exp:"맞습니다. 복수 채권은 별개의 소송물이므로 시효항변은 특정된 채권에만 미치고, 선택적으로 하나만 행사하는 경우 그 채권에 대한 항변으로 봅니다. (2012다68217)"}

  {q:"시효를 주장하는 자가 원고로 된 소송에서 피고가 응소하였다면, 단지 변론에 참가하여 응소한 사실만으로 시효중단의 효과가 곧바로 발생한다.",ans:false,exp:"틀렸습니다. 단순 응소만으로는 부족하고, 시효중단 취지가 포함된 적극적 권리주장이 필요합니다. (2003다17927, 2008다42416)"},

  {q:"위법한 행정처분의 취소나 변경을 구하는 행정소송은 일반적으로 사권을 직접 행사하는 소송이므로, 그 행정소송의 제기는 민사상 사권에 대한 소멸시효 중단사유가 된다. 다만 과세처분 취소소송의 경우에는 오히려 조세부과권의 시효중단에만 영향을 미치고 납세의무자의 부당이득반환청구권의 시효에는 영향을 미치지 않는다.",ans:false,exp:"틀렸습니다. 행정소송은 원칙적으로 사권의 시효중단사유가 아닙니다. 다만 과세처분 취소소송은 예외적으로 부당이득반환청구권의 시효중단사유가 됩니다. (91다32053)"},

  {q:"이미 승소확정판결을 받은 채권에 관하여 10년 시효만료가 임박한 때에 같은 청구로 재소를 제기한 경우, 확정판결이 존재하므로 소의 이익이 없어 각하되어야 한다.",ans:false,exp:"틀렸습니다. 승소 확정판결이 있어도 10년 시효 만료가 임박한 경우 시효중단을 위한 재소는 소의 이익이 인정됩니다. (2018다22008, 2018다24349)"},
  {q:"시효중단을 위한 후소에서, 전소 변론종결 후 발생한 변제·상계·면제·소멸시효 완성과 같은 채권의 소멸사유는 전소 기판력 때문에 심리대상에서 제외된다.",ans:false,exp:"틀렸습니다. 후소 법원은 전소 확정 내용과 양립하지 않게 심리할 수 없지만, 전소 변론종결 후 발생한 변제·상계·면제·시효완성 등은 심리대상입니다. (2018다24349)"},
  {q:"승소확정판결 후 시효중단을 위한 후소의 형태로 '재판상 청구가 있었다는 점의 확인'을 구하는 새로운 형태의 확인소송은 허용될 수 없다.",ans:false,exp:"틀렸습니다. 시효중단을 위한 후소로 '재판상 청구가 있었다는 점의 확인'만을 구하는 새로운 방식의 확인소송도 허용됩니다. (2015다232316)"},
  {q:"파면처분무효확인소송을 제기하였다 하여도 그 소송은 파면처분 자체의 효력만을 다투는 것이므로, 보수금채권에 관하여 별도로 이행소송을 제기하지 않는 이상 보수금채권의 시효는 중단되지 않는다.",ans:false,exp:"틀렸습니다. 파면의 유·무효와 보수금채권의 존부는 표리관계에 있으므로, 파면처분무효확인소송의 제기는 보수금채권의 시효를 중단시키는 재판상 청구에 해당합니다. (77다2509)"},
  {q:"근저당권설정등기청구의 소는 등기절차만을 구하는 것이므로, 그 소 제기만으로는 피담보채권의 소멸시효가 중단되지 않는다.",ans:false,exp:"틀렸습니다. 근저당권설정등기청구의 소에는 피담보채권 존재 주장이 내포되고, 그 존부가 심리·확인되면 피담보채권의 재판상 청구에 준해 시효중단이 인정됩니다. (2002다7213)"},

  {q:"하나의 채권 중 일부만 청구하면서 청구금액 확장 의사를 표시하였으나 소송 종료 시까지 실제로 확장하지 않은 경우, 나머지 부분에 대해서는 재판상 청구에 의한 시효중단사유가 발생하지 않는다. 다만 소송 계속 중에는 나머지 부분에 대해 최고 상태가 유지되어 소송 종료 후 6월 내 조치하면 시효를 중단시킬 수 있다.",ans:true,exp:"맞습니다. 미확장 시 나머지 부분은 재판상 청구 중단이 없으나, 소송 계속 중 최고 상태로 보아 종료 후 6개월 내 조치하면 중단 가능합니다. (2019다223723, 2020다206625)"},
  {q:"채권자가 복수의 채권 중 어느 하나에 기하여 재판상 청구를 하거나 가압류 등의 보전조치를 한 것만으로 다른 채권에 대한 소멸시효 중단의 효력도 발생한다.",ans:false,exp:"틀렸습니다. 복수 채권 중 하나에 대해 한 재판상 청구나 보전조치만으로 다른 별개 채권의 시효까지 중단되지 않습니다(특별사정 제외). (2018다221867)"},

  {q:"채권양도 후 대항요건 구비 전, 양도인이 채무자를 상대로 제기한 소가 기각되어 중단효가 소멸하더라도, 양수인이 그로부터 6월 내 채무자를 상대로 재판상 청구 등을 취하면 양도인의 최초 재판상 청구 시점으로 소급하여 시효중단의 효력이 인정될 수 있다.",ans:true,exp:"맞습니다. 양도인의 소가 기각되어 중단효가 소멸하더라도 양수인이 6개월 내 조치하면 양도인의 최초 제기 시로 소급합니다. (2008두20109)"},
  {q:"확정판결에 기한 채권의 실현을 위하여 채권자가 재산명시신청을 하고 그 결정이 채무자에게 송달된 경우, 재산명시는 민법 제174조의 '최고'에 해당하여, 6월 내 후속 절차 없으면 시효중단의 효력은 상실된다.",ans:true,exp:"맞습니다. 재산명시신청은 재판상 청구가 아니라 '최고'에 불과하여 6개월 내 후속 절차 없으면 중단효가 상실됩니다. (2011다78606)"},
  {q:"채권자가 연대채무자 중 1인의 소유 부동산에 대하여 경매신청을 한 경우, 이는 그 연대채무자에 대한 이행청구로서의 최고에 해당하고, 6월 내 다른 연대채무자에 대하여 재판상 청구를 하면 그 다른 연대채무자에 대한 채권의 소멸시효도 중단될 수 있다. 이때 중단된 시효는 경매절차 종료 시가 아닌 그 다른 연대채무자에 대한 재판이 확정된 때부터 새로 진행한다.",ans:true,exp:"맞습니다. 연대채무자 1인의 부동산 경매신청은 최고에 해당하고, 6개월 내 다른 연대채무자에게 재판상 청구 시 그 시효도 중단됩니다. 새 시효는 재판 확정 시부터 진행합니다. (2001다22840)"},
  {q:"채권자가 채무자의 제3채무자에 대한 채권에 관하여 압류 및 추심명령을 받아 그 결정이 제3채무자에게 송달된 경우, 그 송달은 '최고'에 해당하여 6월 내 추심의 소를 제기하면 채권의 소멸시효는 중단된다.",ans:true,exp:"맞습니다. 압류·추심명령의 제3채무자 송달은 '최고'에 해당하고, 6개월 내 추심소 제기 시 중단효가 유지됩니다. (2019다212945)"},
  {q:"명의신탁자가 부동산 매도인을 대위하여 명의수탁자를 상대로 소유권이전등기 말소를 구하는 소를 제기한 경우, 청구할 권능이 없는 자의 소 제기이므로 시효중단의 효력이 없다.",ans:true,exp:"맞습니다. 재판상 청구가 시효중단사유가 되려면 채권자 또는 그 채권을 행사할 권능을 가진 자에 의해 이루어져야 하므로, 권능 없는 자의 소는 중단효가 없습니다. (2023다3168210)"},
  {q:"채권자가 주채무자에게 이행을 최고하고, 6월 내 주채무자가 채무를 승인하면 최고 시점으로 소급하여 주채무자에 대한 소멸시효 중단의 효력이 발생하며, 민법 제440조에 따라 이 시효중단의 효력은 보증인에게도 미친다.",ans:true,exp:"맞습니다. 주채무자에 대한 최고 후 6개월 내 승인 시 최고 시점으로 소급하여 중단되고, 그 효력은 보증인에게도 미칩니다. (2020다46663; 민법 §440)"},
  {q:"채무자에게 파산원인이 있는 경우 채권자가 파산신청을 하는 것은 민법 제168조 제1호에서 정한 시효중단사유인 재판상 '청구'에 해당한다.",ans:true,exp:"맞습니다. 파산신청은 파산절차 참가와 유사한 재판상 권리실행방법으로서 재판상 '청구'에 해당하여 시효중단이 인정됩니다. (2023마6582)"}

const W27 = [
  {q:"가압류로 인한 시효중단효과의 발생시기는, 민사소송법 제265조를 유추하여 가압류명령이 집행되거나 채무자에게 송달된 때가 아니라 가압류를 신청한 때에 소급하여 시효중단의 효력이 발생한다고 보아야 한다.",ans:true,exp:"맞습니다. 가압류에 의한 시효중단효과는 가압류신청 시점으로 소급하여 발생합니다. (2016다35451)"},
  {q:"가압류채권자의 권리행사는 가압류 신청 시에 시작되고, 가압류명령의 집행이나 송달은 그 이후에 이루어지는 통지 절차에 불과하므로, 가압류신청 이전에는 시효중단의 효력이 발생할 수 없다.",ans:true,exp:"맞습니다. 가압류 시 중단효는 신청 시 발생하며, 그 이전에는 효력이 없습니다. (2016다35451)"},

  {q:"부동산 가압류의 경우, 별다른 특수사정이 없는 한, 가압류에 의한 시효중단사유는 가압류등기가 말소된 때 종료되고, 그 시점부터 새로 소멸시효가 진행한다.",ans:true,exp:"맞습니다. 부동산 가압류는 통상 가압류등기 말소 시 중단사유가 종료되고, 그때부터 새 시효가 진행합니다. (2013다18622, 18639)"},
  {q:"부동산가압류 후 경매절차에서 매각대금에 대한 배당이 이루어지고 그 배당액이 공탁된 경우, 가압류채권자는 그 공탁금에 대하여 계속 권리행사 중이라고 보아야 하므로 가압류에 의한 시효중단의 효력은 배당금 공탁 이후에도 계속 유지된다.",ans:false,exp:"틀렸습니다. 매각대금 배당·공탁이 되었다고 해서 가압류채권자가 그 공탁금에 대해 계속 권리행사 중이라고 볼 수 없고, 시효중단효가 계속되는 것은 아닙니다. (2013다18622, 18639)"},
  {q:"유체동산에 대한 가압류결정을 받았더라도 실제로 집행절차에 착수하지 않은 경우에는 가압류에 의한 시효중단효과가 인정되지 않는다.",ans:true,exp:"맞습니다. 유체동산 가압류결정만 있고 집행에 착수하지 않으면, 현실적 권리행사가 없으므로 시효중단효가 없습니다. (2011다10044)"},
  {q:"유체동산에 대한 가압류 집행절차를 개시하였으나, 가압류할 동산이 없어 집행불능으로 종료된 경우, 가압류에 의한 시효중단은 집행불능으로 인한 절차 종료 시점부터 새로 소멸시효가 진행한다.",ans:true,exp:"맞습니다. 유체동산 가압류 집행불능으로 절차가 종료된 경우, 그 종료 시점부터 새 시효가 진행합니다. (2011다10044)"},
  {q:"가압류의 피보전권리에 대하여 본안에서 승소판결이 확정되었다면, 가압류에 의한 시효중단의 효력은 본안 확정판결에 흡수되어 소멸한다.",ans:false,exp:"틀렸습니다. 가압류와 재판상 청구는 별개의 중단사유이므로, 피보전권리에 대한 본안 승소판결 확정이 있어도 가압류에 의한 중단효가 흡수·소멸하지 않습니다. (2000다11102)"},
  {q:"주택임대차보호법 제3조의3에 따른 임차권등기명령에 기한 임차권등기에는 압류·가압류에 준하는 시효중단효과를 인정할 수 없다.",ans:true,exp:"맞습니다. 임차권등기명령에 따른 임차권등기는 대항력·우선변제권 확보를 위한 담보적 장치일 뿐 집행보전처분이 아니라서 시효중단효가 없습니다. (2017다226629)"},
  {q:"법률에 따른 적법한 가압류가 있었으나, 그 후 제소기간을 도과하여 가압류가 취소된 경우, 민법 제175조에 해당하므로 애초부터 가압류에 의한 시효중단의 효력은 발생하지 않는다.",ans:false,exp:"틀렸습니다. 제소기간 도과로 가압류가 취소된 경우에도 일단 적법한 가압류로 시효는 중단되었다가, 취소 시점부터 다시 진행할 뿐, '애초 중단효가 없던 경우'로 보지 않습니다. (2010다88019)"},
  {q:"가압류결정 후 제소기간을 도과하여 가압류가 취소된 경우에도, 일단 적법한 가압류로 인하여 채권의 소멸시효는 중단되었다가 가압류 취소 시점에서 중단사유가 종료하여 그때부터 새로 소멸시효가 진행한다.",ans:true,exp:"맞습니다. 적법한 가압류 후 제소기간 도과로 취소되었어도, 가압류 시 중단→취소 시부터 새로 진행합니다. (2010다88019)"},
  {q:"경매개시결정이나 경매기일통지서가 주채무자에게 교부송달되지 않고 우편송달이나 공시송달로 송달되어 채무자가 실제로 알 수 없었던 경우에는, 채권자가 교부송달 사실을 주장·증명하지 못한 이상 그 압류로 인한 시효중단효과를 인정하기 어렵다.",ans:true,exp:"맞습니다. 우편·공시송달로 실제 인지가 불가능한 경우 통지로 볼 수 없고, 채권자가 교부송달 사실을 입증해야 합니다. (94다26097)"},
  {q:"민법 제176조에 따라 압류사실의 통지가 있었던 것으로 인정되기 위해서는 경매개시결정이나 경매기일통지서가 주채무자에게 송달되기만 하면 충분하고, 채무자가 그 송달서류를 실제로 수령할 수 있었는지 여부는 중요하지 않다. 우편송달이나 공시송달로 송달된 경우에도 채무자는 압류사실을 통지받은 것으로 본다.",ans:false,exp:"틀렸습니다. 채권자가 교부송달 사실을 입증해야 하며, 우편송달·공시송달로 채무자가 실제 알 수 없었던 경우에는 통지로 인정되지 않습니다. (94다26097)"},
  {q:"원인채권의 지급을 확보하기 위해 약속어음이 수수된 당사자 사이에서, 채권자가 어음채권을 청구채권으로 하여 채무자의 재산을 적법하게 가압류한 경우, 원인채권의 소멸시효를 중단시키는 효력이 있다.",ans:true,exp:"맞습니다. 원인채권의 지급을 확보하기 위해 수수된 어음에 기초하여 적법하게 가압류한 경우, 어음채권 행사=원인채권 실현이므로 원인채권의 시효도 중단됩니다. (99다16378, 2010다6345 1항)"},
  {q:"시효로 소멸한 어음채권을 청구채권으로 삼아 채무자의 재산을 압류했다면, 그 압류로는 원인채권의 소멸시효중단효가 발생하지 않는다.",ans:true,exp:"맞습니다. 이미 시효로 소멸한 어음채권을 청구채권으로 한 압류는 적법한 권리행사가 아니므로, 원인채권의 시효중단효가 발생하지 않습니다. (2010다6345)"},
  {q:"소멸시효 중단사유 중 '승인'은 채무자가 채권자에게 권리의 존재를 인식하고 있음을 표시함으로써 성립하며, 그 표시 방법은 서면이나 구두 등 아무런 형식을 요하지 않고, 명시적이든 묵시적이든 모두 가능하다.",ans:true,exp:"맞습니다. 승인은 형식 제한이 없고 명시·묵시 모두 가능합니다. (92다947, 2011다21556, 2015다239744 등)"},
  {q:"소멸시효 중단사유로서의 채무승인은 관념의 통지로서 시효이익을 포기하려는 효과의사까지 필요하다. 따라서 시효완성 후 채무승인이 있으면 당연히 시효이익 포기까지 인정된다.",ans:false,exp:"틀렸습니다. 채무승인은 관념의 통지로 효과의사가 필요 없고, 시효완성 후 이익포기는 별도의 효과의사가 필요하여 단순 승인만으로 곧바로 포기로 볼 수 없습니다. (2011다21556)"},
  {q:"시효완성 후에 채무자가 소송에서 상계항변을 먼저 한 다음 소멸시효항변을 한 경우, 상계항변 당시 채무자가 수동채권의 시효이익을 포기할 의사까지 가지고 있었다고 단정하기는 어렵다.",ans:true,exp:"맞습니다. 상계항변은 예비적 항변에 불과하므로, 상계항변 당시 시효이익 포기 의사까지 인정되지는 않습니다. (2011다21556)"},
  {q:"국가의 채무에 관하여 소멸시효 중단사유가 되는 승인은, 국가를 대표하거나 그 채무에 관해 적법하게 승인권한을 위임받은 자가 정당한 절차에 따라 승인하였을 때에만 효력이 있고, 권한 없는 공무원(군부대 참모장 등)의 보상 약속 발언만으로는 국가의 채무승인이 되지 않는다.",ans:true,exp:"맞습니다. 국가채무의 시효중단승인은 권한 있는 국가기관이 적법 절차로 한 것만 효력이 있습니다. (69다401)"},

  {q:"회사의 경리과장, 총무과장 또는 출장소장과 같은 일반 관리직 직원은, 특별한 사정이 없는 한 회사의 채무에 관하여 소멸시효 중단사유인 승인을 할 권한이 있다.",ans:false,exp:"틀렸습니다. 회사 경리과장, 총무과장, 출장소장 등은 특별사정이 없는 한 시효중단승인을 할 권한이 없습니다. (65다2133)"},
  {q:"세무관련 행정소송에서 피고가 원고로부터 금원을 차용한 사실을 법정에서 증언한 경우, 이는 채권자에 대한 채무승인으로 인정되어 시효중단이 된다.",ans:true,exp:"맞습니다. 세무관련 행정소송에서 피고가 차용 사실을 증언한 경우, 이는 채권자에 대한 채무승인으로 인정되어 시효중단이 됩니다. (92다947)"},

  {q:"동일 당사자 사이의 계속적인 금전거래에서 채무의 일부에 대한 변제가 이루어지면 그 채무 전부에 관하여 시효중단의 효력이 발생하고, 계속거래 관계에서 전채무액에 미달하는 일부 변제는 특별한 사정이 없는 한 기존 수개의 채무 전체에 대하여 승인을 한 것으로 추단할 수 있다.",ans:true,exp:"맞습니다. 계속적 금전거래에서 일부 변제는 그 채무 전부에 대한 시효중단효를 가지며, 다수 채무가 얽힌 거래에서 전채무액에 미달하는 일부 변제는 기존 수개 채무 전체에 대한 승인으로 추단할 수 있습니다. (78다1790)"},

  {q:"면책적 채무인수가 이루어지는 경우, 채무인수와 동시에 채무승인이 이루어졌다면 채무인수일로부터 새 시효가 진행한다.",ans:true,exp:"맞습니다. 면책적 채무인수와 동시에 채무승인이 이루어졌다면, 그 승인에 의해 채무인수일로부터 새 시효가 진행합니다. (99다12376 2항)"},

  {q:"채무자가 이자 또는 지연손해금의 지급에 갈음하여 채권자로 하여금 담보가등기를 경료한 부동산을 점유·사용하도록 하는 경우에는 계속하여 이자 또는 지연손해금을 일부 변제하는 것과 같으므로 피담보채권의 소멸시효는 그 사용·수익 기간 동안 중단된다. 그러나 단순 점유만 주는 경우에는 시효중단이 안 된다.",ans:true,exp:"맞습니다. 이자·지연손해금 지급에 갈음하여 사용수익하게 한 경우에는 계속적 일부변제로 보아 피담보채권 시효중단이 인정되나, 담보가등기 + 부동산 인도로 단순 점유만 주는 것은 시효중단이 안 됩니다. (2009다51028)"},

  {q:"묵시적 승인을 인정하려면 채무자가 기존 채무의 존재 및 액수에 대해 인식하고 있다는 점을 상대방이 추단할 수 있을 정도의 행동이 필요하고, 이를 주장하는 채권자가 그러한 구체적 사실을 주장·입증해야 한다.",ans:true,exp:"맞습니다. 묵시적 승인을 인정하려면 채무자가 기존 채무의 존재·액수를 인식하고 있음을 상대방이 구체적 사정으로 추단할 수 있어야 하고, 입증책임은 채권자에게 있습니다. (2004다59959)"},
  {q:"채무자가 발송한 승인 안내문이 채권자에게 도달하지 않았다면 그 미도달 통지에 승인의 효력이 인정되지 않는다.",ans:true,exp:"맞습니다. 승인의 통지는 상대방에게 도달해야 효력이 발생하므로, 채무자가 보낸 안내문이 채권자에게 도달하지 않았다면 승인에 의한 시효중단효가 발생하지 않습니다. (95다30178)"},

  {q:"집합건물 경매로 소유권을 취득한 새 구분소유자는, 종전 구분소유자의 체납관리비채무에 관한 시효중단효과 발생 이후에 그 채무를 승계한 자에 해당하므로 시효중단의 효력이 그에게도 미친다.",ans:true,exp:"맞습니다. 관리비 소송에서 종전 구분소유자에 대한 승소판결로 시효가 중단된 후, 경매로 소유권을 취득한 새 구분소유자는 중단효 발생 이후에 승계한 자로서 시효중단효가 그에게도 미칩니다. (2014다81474)"}

  {q:"다른 채권자가 신청한 부동산 경매에서, 이미 시효완성된 채무를 피담보채무로 하는 근저당권자에게 배당되어 일부 변제가 이루어질 때까지 채무자가 이의하지 않았다면, 특별사정이 없는 한 시효이익을 포기한 것으로 본다. 시효이익의 포기는 가분채무의 일부에 대해서도 가능하다.",ans:true,exp:"맞습니다. 경매 배당까지 무이의는 포기 인정 가능하고, 포기는 일부(가분채무)에도 가능합니다. (2011다109500)"},

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
  if (id === 'note') renderNoteScreen();
}

// ════════════════════════════════════════
// QUIZ LOGIC
// ════════════════════════════════════════
let randomCount = 30; // 기본값

function setRandomCount(n, el) {
  randomCount = n;
  document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function startQuiz(mode) {
  currentMode = mode;
  answeredCount = 0;
  correctCount = 0;
  wrongItems = [];

  let pool = BANK[mode] || BANK.all;
  if (mode === 'random') {
    const shuffled = shuffle([...BANK.all]);
    pool = randomCount >= 123 ? shuffled : shuffled.slice(0, randomCount);
  }
  currentQuestions = pool;

  document.getElementById('quiz-title').textContent = mode === 'random'
    ? `랜덤 ${randomCount >= 123 ? '전문제' : randomCount + '문제'}`
    : (TITLES[mode] || '퀴즈');
  document.getElementById('quiz-sub').textContent = `총 ${currentQuestions.length}문제`;
  updateProgress();

  renderQuestions();
  showScreen('quiz');
}

function renderQuestions() {
  const area = document.getElementById('questions-area');
  area.innerHTML = '';
  currentQuestions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'qcard-' + i;
    card.innerHTML = `
      <div class="q-header">
        <span class="q-num-badge">Q${i + 1}</span>
        <span class="q-text">${q.q}</span>
      </div>
      <div class="btn-row">
        <button class="ox-btn" id="obtn-${i}" onclick="answer(${i}, true)">O</button>
        <button class="ox-btn" id="xbtn-${i}" onclick="answer(${i}, false)">X</button>
      </div>
      <div class="feedback-box" id="fb-${i}"></div>
    `;
    area.appendChild(card);
  });
}

function answer(i, val) {
  const oBtn = document.getElementById('obtn-' + i);
  const xBtn = document.getElementById('xbtn-' + i);
  if (oBtn.disabled) return;
  oBtn.disabled = true;
  xBtn.disabled = true;

  const q = currentQuestions[i];
  const correct = (val === q.ans);

  if (correct) {
    correctCount++;
    document.getElementById('qcard-' + i).classList.add('state-correct');
    if (val === true) { oBtn.classList.add('sel-correct-o'); }
    else { xBtn.classList.add('sel-correct-x'); }
  } else {
    wrongItems.push({ num: i + 1, q: q.q, correctAns: q.ans ? 'O' : 'X', exp: q.exp });
    document.getElementById('qcard-' + i).classList.add('state-wrong');
    if (val === true) { oBtn.classList.add('sel-wrong-o'); }
    else { xBtn.classList.add('sel-wrong-x'); }
  }

  const fb = document.getElementById('fb-' + i);
  fb.className = 'feedback-box show ' + (correct ? 'fb-correct' : 'fb-wrong');
  fb.innerHTML = `<span class="fb-label">${correct ? '✓ 정답!' : '✗ 오답.'}</span>${q.exp}`;

  answeredCount++;
  updateProgress();

  if (answeredCount === currentQuestions.length) {
    setTimeout(showResult, 600);
  }
}

function updateProgress() {
  const total = currentQuestions.length;
  const pct = total > 0 ? (answeredCount / total * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `${answeredCount} / ${total}`;
  document.getElementById('score-text').textContent = `정답 ${correctCount}개`;
}

// ════════════════════════════════════════
// RESULT
// ════════════════════════════════════════
function showResult() {
  const total = currentQuestions.length;
  const rate = Math.round(correctCount / total * 100);

  const quizTitle = currentMode === 'random'
    ? `랜덤 ${randomCount >= 123 ? '전문제' : randomCount + '문제'}`
    : (TITLES[currentMode] || '퀴즈');
  document.getElementById('result-quiz-title').textContent = quizTitle;
  document.getElementById('result-score').textContent = correctCount;
  document.getElementById('result-total').textContent = `/ ${total} 문제`;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = total - correctCount;
  document.getElementById('stat-rate').textContent = rate + '%';

  const reviewList = document.getElementById('review-list');
  const reviewSection = document.getElementById('review-section');
  reviewList.innerHTML = '';

  if (wrongItems.length > 0) {
    reviewSection.style.display = 'block';
    const addBtn = document.getElementById('add-to-note-btn');
    addBtn.style.display = 'inline-flex';
    addBtn.textContent = '📋 오답노트에 추가';
    addBtn.disabled = false;
    wrongItems.forEach(item => {
      const div = document.createElement('div');
      div.className = 'review-item';
      div.innerHTML = `<div class="ri-q">Q${item.num}. ${item.q}</div><div class="ri-ans">정답: ${item.correctAns}</div>`;
      reviewList.appendChild(div);
    });
  } else {
    reviewSection.style.display = 'none';
    document.getElementById('add-to-note-btn').style.display = 'none';
  }

  showScreen('result');
}

function retryQuiz() {
  startQuiz(currentMode);
}

function goHome() {
  showScreen('home');
}

// ════════════════════════════════════════
// 오답노트 (세션 내 메모리 저장)
// ════════════════════════════════════════
let noteItems = []; // { id, q, ans, exp }

function addWrongToNote() {
  // 이번 세션 오답 중 아직 노트에 없는 것만 추가
  let added = 0;
  wrongItems.forEach(item => {
    const already = noteItems.find(n => n.q === item.q);
    if (!already) {
      noteItems.push({ id: Date.now() + Math.random(), q: item.q, ans: item.correctAns, exp: item.exp });
      added++;
    }
  });
  updateNoteBadge();
  if (added > 0) {
    const btn = document.getElementById('add-to-note-btn');
    btn.textContent = `✓ ${added}개 추가됨`;
    btn.disabled = true;
    setTimeout(() => {
      btn.textContent = '📋 오답노트에 추가';
      btn.disabled = false;
    }, 2000);
  }
}

function updateNoteBadge() {
  const badge = document.getElementById('note-badge');
  const count = noteItems.length;
  badge.textContent = count;
  badge.classList.toggle('show', count > 0);
}

function renderNoteScreen() {
  const list = document.getElementById('note-list');
  const label = document.getElementById('note-count-label');
  list.innerHTML = '';
  label.textContent = noteItems.length > 0 ? `총 ${noteItems.length}개` : '';

  if (noteItems.length === 0) {
    list.innerHTML = `<div class="note-empty"><span>📋</span>아직 오답노트가 비어 있어요.<br>퀴즈를 풀고 오답을 추가해보세요!</div>`;
    return;
  }

  noteItems.forEach(item => {
    // 판례번호 추출: 괄호 안 숫자+다 패턴
    const citeMatches = item.exp.match(/\(([^)]+)\)/g) || [];
    const citeHTML = citeMatches.map(c => `<span class="note-cite">${c}</span>`).join(' ');

    // 해설에서 판례번호 괄호 제거한 순수 해설
    const pureExp = item.exp.replace(/\s*\([^)]+\)/g, '').trim();

    const card = document.createElement('div');
    card.className = 'note-card';
    card.id = 'note-' + item.id;
    card.innerHTML = `
      <div class="note-card-top">
        <div class="note-q">${item.q}</div>
        <button class="note-del-btn" onclick="removeNoteItem('${item.id}')" title="삭제">✕</button>
      </div>
      <div class="note-divider"></div>
      <div class="note-ans-row">
        <span class="note-ans-badge">정답 ${item.ans}</span>
      </div>
      <div class="note-exp">${pureExp}</div>
      ${citeHTML ? `<div style="margin-top:8px;">${citeHTML}</div>` : ''}
    `;
    list.appendChild(card);
  });
}

function removeNoteItem(id) {
  const card = document.getElementById('note-' + id);
  if (card) {
    card.classList.add('removing');
    setTimeout(() => {
      noteItems = noteItems.filter(n => String(n.id) !== String(id));
      updateNoteBadge();
      renderNoteScreen();
    }, 250);
  }
}

// ════════════════════════════════════════
// UTILS
// ════════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
